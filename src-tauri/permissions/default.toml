"$schema" = "../gen/schemas/desktop-schema.json"

[default]
description = "Allow huumanity's custom Rust commands from the live editor."
permissions = ["allow-app-commands"]

[[permission]]
identifier = "allow-app-commands"
description = "Allow all custom huumanity Rust commands."
commands.allow = [
  "capture_selected_text",
  "paste_text",
  "paste_text_into_source",
  "check_accessibility_permission",
  "request_accessibility_permission",
  "open_accessibility_settings",
  "open_input_monitoring_settings",
  "get_current_selection",
  "get_selector_payload",
  "get_selector_health",
  "show_selector_window",
  "expand_selector_window",
  "position_selector_panel",
  "hide_selector_window",
  "open_billing",
  "set_session_token",
  "get_session_token",
  "refresh_session_token",
  "check_for_updates",
  "restart_app",
]
