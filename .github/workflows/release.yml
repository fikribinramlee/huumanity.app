name: Build Windows

# Runs when you push a tag like v0.1.1, v0.2.0, etc.
on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    # Lets the default GITHUB_TOKEN create a release + upload assets. Without this
    # the token is read-only and the release step fails with 403 "Resource not
    # accessible by integration".
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build
        # These are PUBLIC Clerk values (the publishable key is shipped to every
        # browser that loads huumanity.app) — needed only so `next build` can
        # prerender pages. No secret key is required: the prerendered pages don't
        # call Clerk's backend at build time, and the desktop editor loads the
        # live site at runtime where the real secrets live.
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsuaHV1bWFuaXR5LmFwcCQ
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /download
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /download
        run: npm run tauri:build

      - name: Find installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          # Don't clobber assets already on the release (e.g. the Mac DMG we
          # upload separately) — just add the Windows installer alongside them.
          files: ${{ steps.installer.outputs.path }}
        env:
          # The public huumanity.app repo hosts releases directly, so the built-in
          # token (granted contents:write above) is all we need — no separate repo
          # or RELEASES_TOKEN secret required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
