name: Release

# Push a tag to trigger:  git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write   # create GitHub Release + upload assets

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin   # Apple Silicon
          - platform: macos-latest
            args: --target x86_64-apple-darwin    # Intel Mac
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # ── Build, sign update bundles, and publish to GitHub Release ──
      # tauri-action imports the Apple certificate into a temporary keychain
      # itself when APPLE_CERTIFICATE is provided — no manual `security import`
      # step is needed (and the manual step's `base64 --decode` is fragile on
      # the macOS runner, which is what previously broke the build).
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # These are public Clerk values — shipped to every browser that loads
          # huumanity.app. Required so `next build` can prerender pages.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsuaHV1bWFuaXR5LmFwcCQ
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /download
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /download

          # Tauri updater signing — signs .tar.gz/.zip bundles so the app can
          # verify downloaded updates before installing them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # macOS code signing + notarization. tauri-action handles importing
          # APPLE_CERTIFICATE into a keychain on the macOS runners.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: Fikri Bin ramlee (JJKZ58P2CL)'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'huumanity ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          # tauri-action generates latest.json and uploads it alongside the
          # platform installers — the in-app updater fetches this file.
          args: ${{ matrix.args }}
